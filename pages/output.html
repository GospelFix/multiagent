<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>아웃풋 뷰어 — Multi-Agent Studio</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/output.css">
</head>
<body>

<!-- 모바일 햄버거 메뉴 -->
<button class="hamburger" id="hamburger-btn" aria-label="메뉴 열기">☰</button>

<!-- 사이드바 -->
<aside class="sidebar" id="sidebar" role="navigation" aria-label="주 내비게이션"></aside>

<main class="main" role="main">

  <!-- 페이지 헤더 -->
  <div class="page-header">
    <div>
      <h1 class="page-title">아웃풋 <span>뷰어</span></h1>
      <p class="page-subtitle">에이전트가 생성한 결과물을 확인하고 다운로드합니다</p>
    </div>
    <div class="header-actions">
      <a href="../pages/history.html" class="btn btn-ghost">← 히스토리</a>
      <a href="../index.html" class="btn btn-primary" aria-label="새 실행 시작">
        ▶ 새 실행
      </a>
    </div>
  </div>

  <!-- 아웃풋 뷰어 레이아웃 -->
  <div class="output-layout">

    <!-- 좌측: 파일 목록 패널 -->
    <div class="file-panel">
      <div class="file-panel-header">
        <div class="file-panel-title">생성된 파일</div>
      </div>
      <!-- 파일 목록 (output.js가 동적 생성) -->
      <div class="file-panel-body" id="file-panel-body" role="list" aria-label="아웃풋 파일 목록">
        <div style="text-align:center;padding:24px;color:var(--text-dim);font-family:var(--font-mono);font-size:11px;">
          로딩 중...
        </div>
      </div>
    </div>

    <!-- 우측: 콘텐츠 뷰어 (output.js가 동적 생성) -->
    <div class="content-viewer" id="content-viewer" role="region" aria-label="파일 콘텐츠 뷰어">
      <div class="viewer-empty">
        <div class="viewer-empty-icon">📄</div>
        <div class="viewer-empty-text">
          좌측에서 파일을 선택하면<br>내용이 표시됩니다
        </div>
      </div>
    </div>

  </div>

</main>

<script src="../js/store.js"></script>
<script src="../js/app.js"></script>
<script src="../js/output.js"></script>

</body>
</html>
