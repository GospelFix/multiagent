<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>프롬프트 편집 — Multi-Agent Studio</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/prompts.css">
</head>
<body>

<!-- 모바일 햄버거 메뉴 -->
<button class="hamburger" id="hamburger-btn" aria-label="메뉴 열기">☰</button>

<!-- 사이드바 -->
<aside class="sidebar" id="sidebar" role="navigation" aria-label="주 내비게이션"></aside>

<main class="main" role="main">

  <!-- 페이지 헤더 -->
  <div class="page-header">
    <div>
      <h1 class="page-title">프롬프트 <span>편집</span></h1>
      <p class="page-subtitle">각 에이전트의 시스템 프롬프트를 커스터마이징합니다</p>
    </div>
    <div class="header-actions">
      <a href="../index.html" class="btn btn-ghost">← 파이프라인</a>
    </div>
  </div>

  <!-- 에이전트 탭 (prompts.js가 동적 생성) -->
  <div class="agent-tabs" id="agent-tabs" role="tablist" aria-label="에이전트 선택 탭">
    <div style="color:var(--text-dim);font-size:11px;padding:10px;">로딩 중...</div>
  </div>

  <!-- 편집기 레이아웃 -->
  <div class="prompt-layout">

    <!-- 편집기 (prompts.js가 동적 생성) -->
    <div id="editor-card" class="editor-card" role="region" aria-label="프롬프트 편집기">
      <div style="padding:48px;text-align:center;color:var(--text-dim);font-family:var(--font-mono);font-size:11px;">
        로딩 중...
      </div>
    </div>

    <!-- 우측 사이드 패널 -->
    <div class="prompt-side-panel">

      <!-- 변수 삽입 -->
      <div class="side-panel-card">
        <div class="side-panel-title">컨텍스트 변수 삽입</div>
        <div class="variable-chips" id="variable-chips">
          <!-- prompts.js가 동적 생성 -->
        </div>
      </div>

      <!-- 변수 설명 -->
      <div class="side-panel-card">
        <div class="side-panel-title">변수 설명</div>
        <div id="variable-info">
          <!-- prompts.js가 동적 생성 -->
        </div>
      </div>

      <!-- 팁 -->
      <div class="side-panel-card">
        <div class="side-panel-title">프롬프트 팁</div>
        <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);line-height:1.7;">
          <p style="margin-bottom:8px;">• 역할을 명확히 정의하세요</p>
          <p style="margin-bottom:8px;">• 출력 형식을 구체적으로 지정하세요</p>
          <p style="margin-bottom:8px;">• 이전 에이전트 결과를 <span style="color:var(--accent-design)">{{변수}}</span>로 참조하세요</p>
          <p>• 토큰 추정 = 글자 수 ÷ 4</p>
        </div>
      </div>

    </div>
  </div>

</main>

<script src="../js/store.js"></script>
<script src="../js/app.js"></script>
<script src="../js/prompts.js"></script>

</body>
</html>
